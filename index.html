<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>String Pattern Analyzer</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #0f172a, #1e293b, #3b82f6);
                padding: 20px;
            }

            .container {
                width: 100%;
                max-width: 750px;
                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 24px;
                padding: 30px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                color: white;
            }

            h2 {
                text-align: center;
                margin-bottom: 25px;
                font-size: 2rem;
                letter-spacing: 1px;
            }

            input {
                width: 70%;
                padding: 14px;
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.12);
                color: white;
                outline: none;
                font-size: 16px;
            }

            input::placeholder {
                color: rgba(255, 255, 255, 0.7);
            }

            button {
                padding: 14px 22px;
                border: none;
                border-radius: 12px;
                background: linear-gradient(135deg, #60a5fa, #2563eb);
                color: white;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-left: 10px;
            }

            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
            }

            #output {
                margin-top: 25px;
                display: none;
                border-radius: 20px;
                overflow: hidden;
                animation: fadeIn 0.4s ease;
            }

            .output-card {
                background: rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 20px;
                padding: 24px;
            }

            .section {
                margin-bottom: 20px;
            }

            .section-title {
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #93c5fd;
                margin-bottom: 8px;
            }

            .value {
                font-size: 18px;
                font-weight: 600;
                color: white;
            }

            .pattern-box {
                background: rgba(0, 0, 0, 0.25);
                padding: 15px;
                border-radius: 12px;
                font-family: Consolas, monospace;
                white-space: pre;
                overflow-x: auto;
                margin-top: 8px;
            }

            .result-badge {
                display: inline-block;
                padding: 10px 18px;
                border-radius: 999px;
                font-weight: bold;
                margin-top: 10px;
            }

            .vowel {
                background: rgba(34, 197, 94, 0.2);
                border: 1px solid #22c55e;
                color: #86efac;
            }

            .consonant {
                background: rgba(239, 68, 68, 0.2);
                border: 1px solid #ef4444;
                color: #fca5a5;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(15px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 768px) {
                input {
                    width: 100%;
                    margin-bottom: 12px;
                }

                button {
                    width: 100%;
                    margin-left: 0;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>String Pattern Analyzer</h2>

            <input
                type="text"
                id="strInput"
                placeholder="Enter string (3-10 letters)"
            />
            <button onclick="processString()">Process</button>

            <div id="output"></div>
        </div>

        <script>
            function processString() {
                let str = document.getElementById("strInput").value.trim();

                let isValid = true;
                if (str.length < 3 || str.length > 10) {
                    isValid = false;
                }
                for (let ch of str) {
                    let code = ch.charCodeAt(0);
                    if (
                        !(code >= 65 && code <= 90) &&
                        !(code >= 97 && code <= 122)
                    ) {
                        isValid = false;
                        break;
                    }
                }
                if (!isValid) {
                    document.getElementById("output").innerHTML =
                        "Invalid Input! Enter only alphabets (length 3-10).";
                    return;
                }

                let upperStr = str.toUpperCase();

                let vowels = 0;
                let consonants = 0;

                for (let ch of upperStr) {
                    if ("AEIOU".includes(ch)) {
                        vowels++;
                    } else {
                        consonants++;
                    }
                }

                let pattern1 = "";
                let n = upperStr.length;

                for (let i = n; i >= 1; i--) {
                    pattern1 += upperStr.substring(0, i) + "\n";
                }

                let size = vowels + 3;
                let pattern2 = "";

                for (let i = 1; i <= size; i++) {
                    for (let j = 1; j <= size; j++) {
                        if (i === 1 || i === size || j === 1 || j === size) {
                            pattern2 += "* ";
                        } else {
                            pattern2 += "  ";
                        }
                    }
                    pattern2 += "\n";
                }

                let result;
                if (vowels > consonants) {
                    result = "VOWEL DOMINANT";
                } else {
                    result = "CONSONANT DOMINANT";
                }

                const badgeClass = vowels > consonants ? "vowel" : "consonant";

                document.getElementById("output").style.display = "block";

                document.getElementById("output").innerHTML = `
<div class="output-card">

    <div class="section">
        <div class="section-title">Uppercase String</div>
        <div class="value">${upperStr}</div>
    </div>

    <div class="section">
        <div class="section-title">Statistics</div>
        <div class="value">Vowels: ${vowels}</div>
        <div class="value">Consonants: ${consonants}</div>
    </div>

    <div class="section">
        <div class="section-title">Pattern 1 - Reverse Alphabet Ladder</div>
        <div class="pattern-box">${pattern1}</div>
    </div>

    <div class="section">
        <div class="section-title">
            Pattern 2 - Hollow Square (Size ${size})
        </div>
        <div class="pattern-box">${pattern2}</div>
    </div>

    <div class="section">
        <div class="section-title">Analysis Result</div>
        <span class="result-badge ${badgeClass}">
            ${result}
        </span>
    </div>

</div>
`;

                document.getElementById("strInput").value = "";
                document.getElementById("strInput").focus();
            }
            document
                .getElementById("strInput")
                .addEventListener("keydown", function (event) {
                    if (event.key === "Enter") {
                        processString();
                    }
                });
        </script>
    </body>
</html>
